name = "skald"
compatibility_date = "2024-09-23"
workers_dev = false

[[routes]]
pattern = "tryskald.dev"
custom_domain = true

# Serves the static Astro build. Attach tryskald.dev in the Cloudflare dashboard.
[assets]
directory = "./dist"
not_found_handling = "404-page"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
