name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true
        type: string
      build_cuda:
        description: "Build CUDA artifact on this runner"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  cpu:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            jq \
            libasound2-dev \
            libgtk-4-dev \
            libxkbcommon-dev \
            pkg-config
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - name: Install just
        run: cargo install just --locked
      - name: Install Bun
        run: npm install -g bun
      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile
      - name: Check
        run: just check
      - name: Package CPU archive
        run: scripts/release-package cpu
      - name: Smoke-test CPU archive
        run: |
          for archive in dist/*-cpu.tar.gz; do
            scripts/release-smoke "${archive}" cpu
          done
      - name: Sign CPU artifacts
        if: ${{ secrets.SKALD_GPG_PRIVATE_KEY != '' }}
        env:
          SKALD_GPG_PRIVATE_KEY: ${{ secrets.SKALD_GPG_PRIVATE_KEY }}
          SKALD_GPG_PASSPHRASE: ${{ secrets.SKALD_GPG_PASSPHRASE }}
        run: |
          printf '%s' "${SKALD_GPG_PRIVATE_KEY}" | gpg --batch --import
          for artifact in dist/*.tar.gz dist/*.tar.gz.sha256; do
            gpg --batch --yes --pinentry-mode loopback --passphrase "${SKALD_GPG_PASSPHRASE}" --armor --detach-sign "${artifact}"
          done
      - name: Generate release notes
        run: scripts/release-notes "${{ inputs.tag || github.ref_name }}" > dist/RELEASE_NOTES.md
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          artifacts=(dist/*.tar.gz dist/*.tar.gz.sha256 dist/RELEASE_NOTES.md)
          if compgen -G 'dist/*.asc' >/dev/null; then
            artifacts+=(dist/*.asc)
          fi
          gh release create "${tag}" \
            --draft \
            --title "Skald ${tag}" \
            --notes-file dist/RELEASE_NOTES.md \
            "${artifacts[@]}"

  cuda:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_cuda }}
    runs-on: [self-hosted, linux, x64, cuda]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - name: Package CUDA archive
        run: scripts/release-package cuda
      - name: Smoke-test CUDA archive
        run: |
          for archive in dist/*-cuda.tar.gz; do
            scripts/release-smoke "${archive}" cuda
          done
      - name: Sign CUDA artifacts
        if: ${{ secrets.SKALD_GPG_PRIVATE_KEY != '' }}
        env:
          SKALD_GPG_PRIVATE_KEY: ${{ secrets.SKALD_GPG_PRIVATE_KEY }}
          SKALD_GPG_PASSPHRASE: ${{ secrets.SKALD_GPG_PASSPHRASE }}
        run: |
          printf '%s' "${SKALD_GPG_PRIVATE_KEY}" | gpg --batch --import
          for artifact in dist/*.tar.gz dist/*.tar.gz.sha256; do
            gpg --batch --yes --pinentry-mode loopback --passphrase "${SKALD_GPG_PASSPHRASE}" --armor --detach-sign "${artifact}"
          done
      - name: Upload CUDA artifacts to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifacts=(dist/*.tar.gz dist/*.tar.gz.sha256)
          if compgen -G 'dist/*.asc' >/dev/null; then
            artifacts+=(dist/*.asc)
          fi
          gh release upload "${{ inputs.tag }}" "${artifacts[@]}" --clobber
