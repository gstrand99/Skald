# Skald default Linux configuration.
#
# Copy to ~/.config/skald/config.toml or run:
#   skald config init
#
# Validate after edits:
#   skald config validate
#   skald doctor

# Current schema version. Supported older versions migrate in memory when loaded.
config_version = 2

[daemon]
log_level = "info"
max_concurrent_jobs = 1
protocol_version = 1

[paths]
config_dir = "~/.config/skald"
model_dir = "~/.local/share/skald/models"
# "auto" uses $XDG_RUNTIME_DIR/skald (recommended on Linux).
runtime_dir = "auto"

[audio]
backend = "cpal"
device = "default"
target_sample_rate = 16000
channels = 1
max_record_seconds = 300

[audio.gates]
# Recordings shorter than this or below the energy thresholds are treated as no speech.
min_record_ms = 350
min_rms_energy = 0.003
min_peak_energy = 0.015
notify_on_no_speech = true

[asr]
backend = "whisper_rs"
model_path = "~/.local/share/skald/models/ggml-large-v3-turbo-q5_0.bin"
language = "en"
threads = 8
gpu = true
gpu_backend = "cuda"

[asr.lifecycle]
# keep_warm: load at daemon start and reuse between jobs.
# on_demand: load per job (lower idle memory; higher latency).
mode = "keep_warm"
warm_on_daemon_start = true
idle_unload_seconds = 900

[asr.hallucination_filter]
enabled = true
phrases = [
    "thank you.",
    "thanks for watching.",
    "subtitles by*",
    "subtitle by*",
    "captioned by*",
]

[vocabulary]
enabled = true
initial_prompt_enabled = true
post_replace_enabled = true

[[vocabulary.phrases]]
text = "OpenRouter"

[[vocabulary.phrases]]
text = "Hyprland"

[[vocabulary.phrases]]
text = "Skald"

[[vocabulary.replacements]]
from = "hyper land"
to = "Hyprland"
case_sensitive = false

[[vocabulary.replacements]]
from = "open router"
to = "OpenRouter"
case_sensitive = false

[cleanup]
# Cleanup is opt-in. Audio stays local; transcript text is sent to the provider when enabled.
enabled = false
provider = "none"
# Default OpenRouter model when cleanup is enabled (skald cleanup enable openrouter).
model = "~openai/gpt-mini-latest"
# Cleanup prompt style under paths.config_dir/styles/ (see styles/default.toml).
default_style = "default"
temperature = 0.2
timeout_ms = 10000
fallback_to_raw_on_error = true
skip_if_word_count_below = 5

# To enable: skald cleanup enable openrouter
# (sets provider = "openrouter" and leaves model as above)

[secrets]
# API keys are not stored in config.toml. Use:
#   skald secrets set openrouter
# Lookup order: keyring → OPENROUTER_API_KEY env → optional file fallback.
mode = "auto"
openrouter_env_var = "OPENROUTER_API_KEY"
allow_insecure_file_fallback = false
insecure_file_path = "~/.config/skald/secrets.toml"

[injection]
copy_to_clipboard = true
# off | safe | always
auto_paste = "safe"
max_paste_age_ms = 5000
restore_clipboard = true
paste_delay_ms = 120
fallback_to_clipboard_only = true
notify_on_clipboard_only = true

[injection.linux]
session = "auto"
wayland_paste_command = "wtype -M ctrl -k v -m ctrl"
x11_paste_command = "xdotool key ctrl+v"
# clipboard_only | custom
gnome_wayland_mode = "clipboard_only"
optional_paste_command = ""

[notifications]
enabled = true

[privacy]
# Reserved / not implemented in v1 — must stay false (validation rejects true).
store_history = false
store_audio = false
# Reserved / not implemented in v1 — must stay false (validation rejects true).
store_raw_transcript = false
# Reserved / not implemented in v1 — must stay false (validation rejects true).
store_cleaned_transcript = false
log_transcripts = false
# Include transcript text in broadcast result events (debug only; default false).
emit_transcript_in_events = false

# Experimental: spoken routing at the start of a transcript (disabled by default).
# Requires a prefix such as "skald professional ..." or "skald signature".
# Test with: skald commands test "skald professional hey john thanks"
[voice_commands]
enabled = false
prefix = "skald"

# Realtime transcription preview while recording (never pasted).
# Uses a separate small model on CPU by default while final transcription keeps [asr].
# Enable with preview.enabled = true, then run: skald watch
[preview]
enabled = false
chunk_ms = 2000
step_ms = 1000
overlap_ms = 500
min_rms_energy = 0.003
ring_buffer_seconds = 30
model_path = "~/.local/share/skald/models/ggml-small.en.bin"
gpu = false
threads = 0

[overlay]
mode = "text"
visualizer_style = "waveform"
margin_px = 16
max_width_px = 720
# top | bottom | auto (near cursor on Hyprland/X11)
anchor = "auto"
use_layer_shell = true
hide_when_idle = true
